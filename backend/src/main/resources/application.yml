server:
  port: 8080
  address: 0.0.0.0

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/stock_trading?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: stock_user
    password: stock_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
  jackson:
    time-zone: Asia/Shanghai
